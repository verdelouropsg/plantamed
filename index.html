<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlantaMed</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e1208; --surface: #161c0c; --surface2: #1e2710;
  --border: #2e3d18; --accent: #a8d550; --accent2: #6db33f;
  --accent3: #d4f080; --warn: #e8a135; --danger: #e85535;
  --text: #e8f0d0; --muted: #7a9050; --dim: #3d5020;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; }
body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse 60% 80% at 10% 20%, rgba(100,180,40,0.06) 0%, transparent 60%), radial-gradient(ellipse 50% 60% at 90% 80%, rgba(60,120,20,0.08) 0%, transparent 60%); pointer-events:none; z-index:0; }
.wrap { max-width: 700px; margin: 0 auto; padding: 40px 20px 80px; position: relative; z-index: 1; }
header { display: flex; align-items: center; gap: 14px; margin-bottom: 44px; }
h1 { font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 700; color: var(--accent3); letter-spacing: -0.02em; line-height: 1; }
.tagline { font-size: 0.68rem; color: var(--muted); margin-top: 5px; letter-spacing: 0.08em; text-transform: uppercase; }
#uploadArea { background: var(--surface); border: 1.5px dashed var(--border); border-radius: 16px; padding: 52px 20px; text-align: center; }
#uploadArea .icon { font-size: 3rem; display: block; margin-bottom: 16px; }
#uploadArea h2 { font-family: 'Fraunces', serif; font-size: 1.25rem; color: var(--text); margin-bottom: 8px; font-weight: 500; }
#uploadArea p { font-size: 0.7rem; color: var(--muted); line-height: 1.7; margin-bottom: 20px; }
#fileInput { display: block; margin: 0 auto; padding: 11px 26px; background: var(--accent2); color: var(--bg); border: none; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; }
#fileInput:hover { background: var(--accent); }
#previewArea { display: none; margin-top: 24px; }
#previewArea img { width: 100%; max-height: 320px; object-fit: cover; border-radius: 12px; border: 1px solid var(--border); display: block; }
#removeBtn { margin-top: 10px; padding: 8px 16px; background: transparent; color: var(--danger); border: 1px solid rgba(232,85,53,0.35); border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.68rem; cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; }
#analyzeBtn { display: block; width: 100%; margin-top: 14px; padding: 16px; background: linear-gradient(135deg, var(--accent2), var(--accent3)); color: var(--bg); border: none; border-radius: 12px; font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; }
#analyzeBtn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(109,179,63,0.3); }
#analyzeBtn:disabled { opacity: 0.4; cursor: not-allowed; }
#loadingArea { display: none; text-align: center; padding: 52px 0; }
.spinner { width: 46px; height: 46px; margin: 0 auto 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loadingArea h3 { font-family: 'Fraunces', serif; font-size: 1.1rem; margin-bottom: 6px; }
#loadingArea p { font-size: 0.68rem; color: var(--muted); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
#errorArea { display: none; background: rgba(232,85,53,0.08); border: 1px solid rgba(232,85,53,0.25); border-radius: 12px; padding: 16px 18px; margin-top: 16px; font-size: 0.8rem; color: #e88070; line-height: 1.6; word-break: break-word; }
#resultArea { display: none; margin-top: 28px; animation: up 0.5s ease forwards; }
@keyframes up { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.r-header { display: flex; align-items: center; gap: 12px; padding-bottom: 18px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
.dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
.dot-ok { background: var(--accent); box-shadow: 0 0 10px rgba(168,213,80,0.5); }
.dot-warn { background: var(--warn); box-shadow: 0 0 10px rgba(232,161,53,0.5); }
.dot-bad { background: var(--danger); box-shadow: 0 0 10px rgba(232,85,53,0.5); }
.r-title { font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 700; color: var(--accent3); flex: 1; }
.conf { font-size: 0.62rem; color: var(--muted); border: 1px solid var(--border); padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 12px; }
.clabel { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); margin-bottom: 9px; }
.ctext { font-size: 0.82rem; line-height: 1.75; }
.steps { list-style: none; display: grid; gap: 9px; }
.steps li { display: flex; gap: 11px; align-items: flex-start; font-size: 0.8rem; line-height: 1.65; }
.snum { width: 20px; height: 20px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: var(--accent); flex-shrink: 0; margin-top: 2px; }
.urgency { display: inline-flex; align-items: center; padding: 5px 13px; border-radius: 20px; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
.u-ok { background: rgba(168,213,80,0.12); color: var(--accent); border: 1px solid rgba(168,213,80,0.3); }
.u-warn { background: rgba(232,161,53,0.12); color: var(--warn); border: 1px solid rgba(232,161,53,0.3); }
.u-bad { background: rgba(232,85,53,0.12); color: var(--danger); border: 1px solid rgba(232,85,53,0.3); }
#resetBtn { width: 100%; margin-top: 16px; padding: 11px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 10px; font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
#resetBtn:hover { border-color: var(--accent2); color: var(--accent); }
footer { text-align: center; margin-top: 60px; font-size: 0.62rem; color: var(--dim); line-height: 1.9; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
      <ellipse cx="22" cy="18" rx="14" ry="18" fill="#6db33f" opacity="0.15"/>
      <path d="M22 38 Q10 28 10 18 Q10 6 22 6 Q34 6 34 18 Q34 28 22 38Z" fill="#6db33f" opacity="0.5"/>
      <path d="M22 38 Q22 20 22 6" stroke="#a8d550" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M22 26 Q16 22 14 16" stroke="#a8d550" stroke-width="1" stroke-linecap="round"/>
      <path d="M22 22 Q28 18 30 12" stroke="#a8d550" stroke-width="1" stroke-linecap="round"/>
    </svg>
    <div>
      <h1>PlantaMed</h1>
      <p class="tagline">Diagnóstico inteligente de plantas</p>
    </div>
  </header>
 
  <div id="uploadArea">
    <span class="icon">🌿</span>
    <h2>Envie a foto da sua planta</h2>
    <p>Foto clara das folhas, caule ou raízes com sintomas<br>JPG, PNG ou WEBP · até 10 MB</p>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" onchange="handleFile(this)">
  </div>
 
  <div id="previewArea">
    <img id="previewImg" src="" alt="Planta">
    <button id="removeBtn" onclick="resetAll()">✕ Remover foto</button>
    <button id="analyzeBtn" onclick="analyze()">🔬 Analisar Planta</button>
  </div>
 
  <div id="loadingArea">
    <div class="spinner"></div>
    <h3>Analisando sua planta…</h3>
    <p id="loadMsg">Identificando sintomas visuais</p>
  </div>
 
  <div id="errorArea"></div>
 
  <div id="resultArea">
    <div class="r-header">
      <div class="dot" id="dot"></div>
      <div class="r-title" id="rTitle"></div>
      <div class="conf" id="rConf"></div>
    </div>
    <div id="rBody"></div>
    <button id="resetBtn" onclick="resetAll()">↺ Analisar outra planta</button>
  </div>
 
  <footer>PlantaMed · Diagnóstico por IA · Consulte um agrônomo para casos graves</footer>
</div>
 
<script>
const API_URL = "/api/diagnose";
let b64 = null, imgType = null;
const msgs = ["Identificando sintomas visuais…","Verificando padrões de coloração…","Analisando textura das folhas…","Comparando com base de pragas…","Checando sinais de deficiência hídrica…","Preparando diagnóstico…"];
 
function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  if (!file.type.startsWith("image/")) { showErr("Envie uma imagem JPG, PNG ou WEBP."); return; }
  if (file.size > 10 * 1024 * 1024) { showErr("Imagem muito grande. Máximo: 10 MB."); return; }
  imgType = file.type;
  const reader = new FileReader();
  reader.onload = function(e) {
    b64 = e.target.result.split(",")[1];
    document.getElementById("previewImg").src = e.target.result;
    document.getElementById("uploadArea").style.display = "none";
    document.getElementById("previewArea").style.display = "block";
    document.getElementById("errorArea").style.display = "none";
    document.getElementById("resultArea").style.display = "none";
  };
  reader.readAsDataURL(file);
}
 
async function analyze() {
  if (!b64) { showErr("Nenhuma imagem carregada."); return; }
  document.getElementById("loadingArea").style.display = "block";
  document.getElementById("analyzeBtn").disabled = true;
  document.getElementById("errorArea").style.display = "none";
  document.getElementById("resultArea").style.display = "none";
  let i = 0;
  const t = setInterval(() => { document.getElementById("loadMsg").textContent = msgs[(++i) % msgs.length]; }, 2000);
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ imageBase64: b64, imageType: imgType })
    });
    clearInterval(t);
    document.getElementById("loadingArea").style.display = "none";
    const text = await res.text();
    if (!res.ok) {
      let msg = "Erro " + res.status;
      try { msg = JSON.parse(text).error || msg; } catch {}
      throw new Error(msg);
    }
    const data = JSON.parse(text);
    if (data.error) throw new Error(data.error);
    showResult(data);
  } catch(e) {
    clearInterval(t);
    document.getElementById("loadingArea").style.display = "none";
    document.getElementById("analyzeBtn").disabled = false;
    showErr("❌ " + e.message);
  }
}
 
function showResult(r) {
  const dotEl = document.getElementById("dot");
  dotEl.className = "dot";
  if (r.categoria==="saudavel"||r.severidade==="saudavel"||r.severidade==="leve") dotEl.classList.add("dot-ok");
  else if (r.severidade==="moderada") dotEl.classList.add("dot-warn");
  else dotEl.classList.add("dot-bad");
  document.getElementById("rTitle").textContent = r.diagnostico||"—";
  document.getElementById("rConf").textContent = "Confiança: "+(r.confianca||"—");
  const urg = {leve:["u-ok","● Sem urgência"],moderada:["u-warn","● Atenção necessária"],urgente:["u-bad","● Ação imediata"]}[r.urgencia]||["u-warn","● Verificar"];
  const cat = {praga:"🐛",hidratacao:"💧",doenca:"🍂",nutricional:"🌱",saudavel:"✅",desconhecido:"❓"};
  const steps = (r.passos||[]).map((p,i)=>`<li><span class="snum">${i+1}</span><span>${p}</span></li>`).join("");
  document.getElementById("rBody").innerHTML = `
    <div class="card"><div class="clabel">Diagnóstico ${cat[r.categoria]||"🌿"}</div><div class="ctext">${r.descricao||""}</div></div>
    <div class="card"><div class="clabel">Causas prováveis</div><div class="ctext">${r.causas||"—"}</div></div>
    <div class="card"><div class="clabel">Urgência</div><span class="urgency ${urg[0]}">${urg[1]}</span></div>
    <div class="card"><div class="clabel">O que fazer</div><ul class="steps">${steps}</ul></div>
    <div class="card"><div class="clabel">Prevenção futura</div><div class="ctext">${r.prevencao||"—"}</div></div>`;
  document.getElementById("resultArea").style.display = "block";
}
 
function showErr(msg) {
  const el = document.getElementById("errorArea");
  el.textContent = msg;
  el.style.display = "block";
}
 
function resetAll() {
  b64=null; imgType=null;
  document.getElementById("fileInput").value="";
  document.getElementById("uploadArea").style.display="block";
  document.getElementById("previewArea").style.display="none";
  document.getElementById("loadingArea").style.display="none";
  document.getElementById("resultArea").style.display="none";
  document.getElementById("errorArea").style.display="none";
  document.getElementById("analyzeBtn").disabled=false;
}
</script>
</body>
</html>
