<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlantaMed — Diagnóstico de Plantas</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e1208;
  --surface: #161c0c;
  --surface2: #1e2710;
  --border: #2e3d18;
  --accent: #a8d550;
  --accent2: #6db33f;
  --accent3: #d4f080;
  --warn: #e8a135;
  --danger: #e85535;
  --text: #e8f0d0;
  --muted: #7a9050;
  --dim: #3d5020;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; }
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 80% at 10% 20%, rgba(100,180,40,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 90% 80%, rgba(60,120,20,0.08) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
.wrap { max-width: 720px; margin: 0 auto; padding: 40px 20px 80px; position: relative; z-index: 1; }
header { display: flex; align-items: center; gap: 14px; margin-bottom: 48px; }
h1 { font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 700; color: var(--accent3); letter-spacing: -0.02em; line-height: 1; }
.tagline { font-size: 0.68rem; color: var(--muted); margin-top: 5px; letter-spacing: 0.08em; text-transform: uppercase; }
.drop-zone {
  border: 1.5px dashed var(--border); border-radius: 16px; padding: 52px 20px;
  text-align: center; cursor: pointer; background: var(--surface); transition: all 0.3s;
}
.drop-zone:hover, .drop-zone.over { border-color: var(--accent2); background: var(--surface2); }
.drop-icon { font-size: 3rem; display: block; margin-bottom: 16px; }
.drop-title { font-family: 'Fraunces', serif; font-size: 1.25rem; color: var(--text); margin-bottom: 8px; }
.drop-sub { font-size: 0.7rem; color: var(--muted); line-height: 1.7; }
.pick-btn {
  display: inline-block; margin-top: 20px; padding: 11px 26px;
  background: var(--accent2); color: var(--bg); border: none; border-radius: 8px;
  font-family: 'DM Mono', monospace; font-size: 0.72rem; font-weight: 500;
  letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: background 0.2s;
}
.pick-btn:hover { background: var(--accent); }
input[type=file] { display: none; }
.preview { display: none; margin-top: 24px; }
.preview.on { display: block; }
.img-wrap { position: relative; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
.img-wrap img { width: 100%; max-height: 320px; object-fit: cover; display: block; }
.img-badge { position: absolute; top: 10px; right: 10px; background: rgba(14,18,8,0.85); border: 1px solid var(--border); border-radius: 6px; padding: 3px 9px; font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; backdrop-filter: blur(8px); }
.img-remove { position: absolute; top: 10px; left: 10px; background: rgba(14,18,8,0.85); border: 1px solid rgba(232,85,53,0.35); border-radius: 6px; padding: 3px 9px; font-size: 0.62rem; color: var(--danger); cursor: pointer; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; backdrop-filter: blur(8px); }
.img-remove:hover { background: rgba(232,85,53,0.15); }
.analyze-btn {
  width: 100%; margin-top: 14px; padding: 16px;
  background: linear-gradient(135deg, var(--accent2), var(--accent3));
  color: var(--bg); border: none; border-radius: 12px;
  font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 700;
  cursor: pointer; transition: all 0.3s; letter-spacing: -0.01em;
}
.analyze-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(109,179,63,0.3); }
.analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.loading { display: none; text-align: center; padding: 52px 0; }
.loading.on { display: block; }
.spinner { width: 46px; height: 46px; margin: 0 auto 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.load-title { font-family: 'Fraunces', serif; font-size: 1.1rem; margin-bottom: 6px; }
.load-sub { font-size: 0.68rem; color: var(--muted); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
.result { display: none; margin-top: 32px; animation: up 0.5s ease forwards; }
.result.on { display: block; }
@keyframes up { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
.r-header { display: flex; align-items: center; gap: 12px; padding-bottom: 20px; margin-bottom: 22px; border-bottom: 1px solid var(--border); }
.dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.dot-ok   { background: var(--accent); box-shadow: 0 0 12px rgba(168,213,80,0.5); }
.dot-warn { background: var(--warn);   box-shadow: 0 0 12px rgba(232,161,53,0.5); }
.dot-bad  { background: var(--danger); box-shadow: 0 0 12px rgba(232,85,53,0.5); }
.r-title { font-family: 'Fraunces', serif; font-size: 1.35rem; font-weight: 700; color: var(--accent3); flex: 1; }
.conf-tag { font-size: 0.62rem; color: var(--muted); border: 1px solid var(--border); padding: 3px 9px; border-radius: 4px; letter-spacing: 0.06em; text-transform: uppercase; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 14px; }
.clabel { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); margin-bottom: 10px; font-weight: 500; }
.ctext { font-size: 0.83rem; line-height: 1.75; }
.steps { list-style: none; display: grid; gap: 10px; }
.steps li { display: flex; gap: 12px; align-items: flex-start; font-size: 0.82rem; line-height: 1.65; }
.snum { width: 22px; height: 22px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: var(--accent); flex-shrink: 0; margin-top: 2px; }
.urgency { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
.u-ok   { background: rgba(168,213,80,0.12); color: var(--accent); border: 1px solid rgba(168,213,80,0.3); }
.u-warn { background: rgba(232,161,53,0.12); color: var(--warn);   border: 1px solid rgba(232,161,53,0.3); }
.u-bad  { background: rgba(232,85,53,0.12);  color: var(--danger); border: 1px solid rgba(232,85,53,0.3); }
.reset-btn { width: 100%; margin-top: 18px; padding: 12px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 10px; font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.reset-btn:hover { border-color: var(--accent2); color: var(--accent); }
.error { display: none; background: rgba(232,85,53,0.08); border: 1px solid rgba(232,85,53,0.25); border-radius: 12px; padding: 18px; margin-top: 18px; font-size: 0.8rem; color: #e88070; line-height: 1.6; }
.error.on { display: block; }
footer { text-align: center; margin-top: 60px; font-size: 0.63rem; color: var(--dim); line-height: 1.9; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
      <ellipse cx="22" cy="18" rx="14" ry="18" fill="#6db33f" opacity="0.15"/>
      <path d="M22 38 Q10 28 10 18 Q10 6 22 6 Q34 6 34 18 Q34 28 22 38Z" fill="#6db33f" opacity="0.5"/>
      <path d="M22 38 Q22 20 22 6" stroke="#a8d550" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M22 26 Q16 22 14 16" stroke="#a8d550" stroke-width="1" stroke-linecap="round"/>
      <path d="M22 22 Q28 18 30 12" stroke="#a8d550" stroke-width="1" stroke-linecap="round"/>
    </svg>
    <div>
      <h1>PlantaMed</h1>
      <p class="tagline">Diagnóstico inteligente de plantas</p>
    </div>
  </header>

  <div class="drop-zone" id="dropZone">
    <span class="drop-icon">🌿</span>
    <div class="drop-title">Envie a foto da sua planta</div>
    <div class="drop-sub">Foto clara das folhas, caule ou raízes com sintomas<br>JPG, PNG ou WEBP · até 10 MB</div>
    <button class="pick-btn" onclick="document.getElementById('fileIn').click()">Escolher Foto</button>
    <input type="file" id="fileIn" accept="image/*">
  </div>

  <div class="preview" id="preview">
    <div class="img-wrap">
      <img id="previewImg" src="" alt="">
      <span class="img-badge">Foto carregada</span>
      <button class="img-remove" onclick="resetAll()">✕ Remover</button>
    </div>
    <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">🔬 Analisar Planta</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="load-title">Analisando sua planta…</div>
    <div class="load-sub" id="loadMsg">Identificando sintomas visuais</div>
  </div>

  <div class="error" id="errorBox"></div>

  <div class="result" id="result">
    <div class="r-header">
      <div class="dot" id="dot"></div>
      <div class="r-title" id="rTitle"></div>
      <div class="conf-tag" id="rConf"></div>
    </div>
    <div id="rBody"></div>
    <button class="reset-btn" onclick="resetAll()">↺ Analisar outra planta</button>
  </div>

  <footer>
    PlantaMed · Diagnóstico por IA · Consulte um agrônomo para casos graves
  </footer>
</div>

<script>
// A URL da API — no Vercel, /api/diagnose já funciona automaticamente
const API_URL = "/api/diagnose";

let b64 = null, imgType = null;

const dropZone   = document.getElementById("dropZone");
const fileIn     = document.getElementById("fileIn");
const preview    = document.getElementById("preview");
const previewImg = document.getElementById("previewImg");
const analyzeBtn = document.getElementById("analyzeBtn");
const loading    = document.getElementById("loading");
const loadMsg    = document.getElementById("loadMsg");
const errorBox   = document.getElementById("errorBox");
const result     = document.getElementById("result");

const msgs = [
  "Identificando sintomas visuais…",
  "Verificando padrões de coloração…",
  "Analisando textura das folhas…",
  "Comparando com base de pragas…",
  "Checando sinais de deficiência hídrica…",
  "Preparando diagnóstico…",
];

dropZone.addEventListener("dragover",  e => { e.preventDefault(); dropZone.classList.add("over"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("over"));
dropZone.addEventListener("drop", e => { e.preventDefault(); dropZone.classList.remove("over"); loadFile(e.dataTransfer.files[0]); });
dropZone.addEventListener("click", e => { if (e.target.closest(".pick-btn")) fileIn.click(); });
fileIn.addEventListener("change", () => loadFile(fileIn.files[0]));

function loadFile(file) {
  if (!file?.type.startsWith("image/")) return showErr("Envie uma imagem JPG, PNG ou WEBP.");
  if (file.size > 10 * 1024 * 1024) return showErr("Imagem muito grande. Máximo: 10 MB.");
  imgType = file.type;
  const r = new FileReader();
  r.onload = e => {
    b64 = e.target.result.split(",")[1];
    previewImg.src = e.target.result;
    dropZone.style.display = "none";
    preview.classList.add("on");
    errorBox.classList.remove("on");
    result.classList.remove("on");
  };
  r.readAsDataURL(file);
}

async function analyze() {
  if (!b64) return;
  loading.classList.add("on");
  analyzeBtn.disabled = true;
  errorBox.classList.remove("on");
  result.classList.remove("on");

  let i = 0;
  const t = setInterval(() => { loadMsg.textContent = msgs[(++i) % msgs.length]; }, 2000);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ imageBase64: b64, imageType: imgType }),
    });

    clearInterval(t);
    loading.classList.remove("on");

    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error || `Erro ${res.status}`);
    }

    const data = await res.json();
    if (data.error) throw new Error(data.error);
    showResult(data);

  } catch (e) {
    clearInterval(t);
    loading.classList.remove("on");
    analyzeBtn.disabled = false;
    showErr(e.message);
  }
}

function showResult(r) {
  const dot = document.getElementById("dot");
  dot.className = "dot";
  if (r.categoria === "saudavel" || r.severidade === "saudavel" || r.severidade === "leve") dot.classList.add("dot-ok");
  else if (r.severidade === "moderada") dot.classList.add("dot-warn");
  else dot.classList.add("dot-bad");

  document.getElementById("rTitle").textContent = r.diagnostico || "—";
  document.getElementById("rConf").textContent  = "Confiança: " + (r.confianca || "—");

  const urg = { leve:["u-ok","● Sem urgência"], moderada:["u-warn","● Atenção necessária"], urgente:["u-bad","● Ação imediata"] }[r.urgencia] || ["u-warn","● Verificar"];
  const cat = { praga:"🐛", hidratacao:"💧", doenca:"🍂", nutricional:"🌱", saudavel:"✅", desconhecido:"❓" };
  const steps = (r.passos||[]).map((p,i) => `<li><span class="snum">${i+1}</span><span>${p}</span></li>`).join("");

  document.getElementById("rBody").innerHTML = `
    <div class="card"><div class="clabel">Diagnóstico ${cat[r.categoria]||"🌿"}</div><div class="ctext">${r.descricao||""}</div></div>
    <div class="card"><div class="clabel">Causas prováveis</div><div class="ctext">${r.causas||"—"}</div></div>
    <div class="card"><div class="clabel">Urgência</div><span class="urgency ${urg[0]}">${urg[1]}</span></div>
    <div class="card"><div class="clabel">O que fazer</div><ul class="steps">${steps}</ul></div>
    <div class="card"><div class="clabel">Prevenção futura</div><div class="ctext">${r.prevencao||"—"}</div></div>`;

  result.classList.add("on");
}

function showErr(msg) { errorBox.textContent = "❌ " + msg; errorBox.classList.add("on"); }
function resetAll() {
  b64=null; imgType=null; fileIn.value="";
  dropZone.style.display="";
  preview.classList.remove("on");
  result.classList.remove("on");
  errorBox.classList.remove("on");
  loading.classList.remove("on");
  analyzeBtn.disabled=false;
}
</script>
</body>
</html>
